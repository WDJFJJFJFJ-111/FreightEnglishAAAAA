<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="货代英语">
  <title>Freight English Trainer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
</head>
<body>
<div id="app">
  <header>
    <div class="header-title">
      <span>🚢</span>
      <span id="header-title">货代英语</span>
    </div>
    <div class="header-right">
      <div class="streak-badge">
        <span>🔥</span>
        <span id="streak-num">0</span>天
      </div>
    </div>
  </header>

  <main id="main"></main>

  <nav>
    <div class="nav-item active" data-tab="home" onclick="App.switchTab('home')">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">今日</span>
    </div>
    <div class="nav-item" data-tab="words" onclick="App.switchTab('words')">
      <span class="nav-icon">📚</span>
      <span class="nav-label">单词</span>
    </div>
    <div class="nav-item" data-tab="sentences" onclick="App.switchTab('sentences')">
      <span class="nav-icon">💬</span>
      <span class="nav-label">句子</span>
    </div>
    <div class="nav-item" data-tab="dialogue" onclick="App.switchTab('dialogue')">
      <span class="nav-icon">🎤</span>
      <span class="nav-label">跟读</span>
    </div>
    <div class="nav-item" data-tab="progress" onclick="App.switchTab('progress')">
      <span class="nav-icon">📊</span>
      <span class="nav-label">进度</span>
    </div>
  </nav>
</div>

<div class="toast-container" id="toasts"></div>

<script src="app.js"></script>
</body>
</html>
